version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: monesto_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-finance_app}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - monesto_network

  backend:
    build:
      context: ./apps/webapp-server
      dockerfile: Dockerfile
    container_name: monesto_backend
    restart: unless-stopped
    ports:
      - '${BACKEND_PORT:-3000}:3000'
    env_file:
      - ./apps/webapp-server/.env.production
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-finance_app}
      - BOT_TOKEN=${BOT_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - monesto_network

  frontend:
    build:
      context: ./apps/webapp
      dockerfile: Dockerfile
      args:
        - PUBLIC_TELEGRAM_DEV_ID=${PUBLIC_TELEGRAM_DEV_ID:-}
        - PUBLIC_API_URL=${PUBLIC_API_URL:-http://localhost:3000/api}
    container_name: monesto_frontend
    restart: unless-stopped
    ports:
      - '${FRONTEND_PORT:-3001}:3000'
    env_file:
      - ./apps/webapp/.env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - PUBLIC_API_URL=${PUBLIC_API_URL:-http://localhost:3000/api}
      - PUBLIC_TELEGRAM_DEV_ID=${PUBLIC_TELEGRAM_DEV_ID:-}
    depends_on:
      - backend
    networks:
      - monesto_network

volumes:
  postgres_data:

networks:
  monesto_network:
    driver: bridge
