name: PR conventions

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches: [main, master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Проверка названия PR, ветки и описания
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const headRef = pr.head.ref;
            const title = pr.title.trim();
            const rawBody = pr.body ?? "";
            const bodyWithoutComments = rawBody.replace(/<!--[\s\S]*?-->/g, "").trim();

            if (headRef.startsWith("dependabot/")) {
              core.info("Пропуск: ветка dependabot.");
              return;
            }

            const branchRe = /^(feature|fix)\/.+$/;
            if (!branchRe.test(headRef)) {
              core.setFailed(
                [
                  "Неверное имя ветки.",
                  "Ожидается: feature/<название> или fix/<название> (латиница, kebab-case, без пробелов).",
                  `Текущая ветка: ${headRef}`,
                ].join("\n")
              );
              return;
            }

            const titleRe = /^(feature|fix)\/([^:]+):\s+\S.*$/;
            const titleMatch = title.match(titleRe);
            if (!titleMatch) {
              core.setFailed(
                [
                  "Неверный заголовок PR.",
                  "Ожидается: feature/<slug>: <короткое описание> или fix/<slug>: <короткое описание>",
                  "После двоеточия обязательны пробел и текст описания.",
                  `Текущий заголовок: ${title}`,
                ].join("\n")
              );
              return;
            }

            const branchSlugMatch = headRef.match(/^(feature|fix)\/(.+)$/);
            const titleKind = titleMatch[1];
            const titleSlug = titleMatch[2];
            const branchKind = branchSlugMatch[1];
            const branchSlug = branchSlugMatch[2];
            if (titleKind !== branchKind || titleSlug !== branchSlug) {
              core.setFailed(
                [
                  "Префикс и slug в заголовке PR должны совпадать с веткой.",
                  `Ветка: ${headRef} → ожидается заголовок: ${branchKind}/${branchSlug}: <описание>`,
                  `Сейчас заголовок: ${title}`,
                ].join("\n")
              );
              return;
            }

            const minBodyLen = 80;
            if (bodyWithoutComments.length < minBodyLen) {
              core.setFailed(
                [
                  "Описание PR слишком короткое или пустое.",
                  `После удаления HTML-комментариев нужно не менее ${minBodyLen} символов текста.`,
                  "Заполните разделы шаблона (описание, тип изменения и т.д.).",
                ].join("\n")
              );
              return;
            }

            const descMatch = bodyWithoutComments.match(
              /## Описание\s*\n+([\s\S]*?)(?=\n## |\n##$|$)/
            );
            const descText = descMatch ? descMatch[1].trim() : "";
            const minDescLen = 30;
            if (descText.length < minDescLen) {
              core.setFailed(
                [
                  "Раздел «Описание» пустой или слишком короткий.",
                  `Под заголовком ## Описание добавьте не менее ${minDescLen} символов: что меняется и зачем.`,
                  "Не оставляйте только пустые строки до следующего раздела.",
                ].join("\n")
              );
              return;
            }

            core.info("Проверки PR: OK.");
