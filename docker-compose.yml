version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: finance_postgres
    restart: always
    ports:
      - '4321:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: finance_app
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
